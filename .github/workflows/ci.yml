name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LLVM_VERSION: "19"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM (for bpf-linker)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-${LLVM_VERSION} llvm-${LLVM_VERSION} llvm-${LLVM_VERSION}-dev \
            libclang-${LLVM_VERSION}-dev libpolly-${LLVM_VERSION}-dev
          echo "/usr/lib/llvm-${LLVM_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Install Rust nightly + rust-src
        run: |
          rustup toolchain install nightly \
            --component rust-src --component rustfmt --component clippy
          rustup default nightly

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Format check
        run: cargo fmt --all -- --check

      # Exclude the eBPF crate: it only compiles for the `bpf` target (built by
      # l4's build script), not the host triple `--workspace` would force here.
      - name: Clippy
        run: cargo clippy --workspace --exclude l4-ebpf -- -D warnings

      # This compiles the eBPF object for the BPF target via l4's build script.
      - name: Build (release)
        run: cargo build --release --package l4
