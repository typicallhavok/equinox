name: docker

# Builds the ingress shield image and publishes it to:
#   - GitHub Container Registry (ghcr.io) — zero setup, uses GITHUB_TOKEN.
#   - Docker Hub (docker.io) — only if the DOCKERHUB_* secrets below are set.
#
# To enable Docker Hub, add two repo secrets (Settings > Secrets > Actions):
#   DOCKERHUB_USERNAME  your Docker Hub username
#   DOCKERHUB_TOKEN     a Docker Hub access token (Account Settings > Security)
# The image then pushes to docker.io/<DOCKERHUB_USERNAME>/equinox.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Secrets are read once here so they aren't referenced all over the file.
    # (Editor "context access might be invalid" hints are just the linter not
    # knowing whether the secret is set — they're harmless and disappear once
    # the secrets exist.)
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR image names must be lowercase; the owner/repo may not be.
      - name: Compute image names
        id: names
        run: |
          echo "ghcr=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "dockerhub_enabled=true" >> "$GITHUB_OUTPUT"
            echo "dockerhub=docker.io/${DOCKERHUB_USERNAME}/equinox" >> "$GITHUB_OUTPUT"
          else
            echo "dockerhub_enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.names.outputs.dockerhub_enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR always; Docker Hub added only when credentials are present.
          images: |
            ${{ steps.names.outputs.ghcr }}
            ${{ steps.names.outputs.dockerhub_enabled == 'true' && steps.names.outputs.dockerhub || '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
