# ====================================================================
# equinox ingress shield — nginx-style quick setup
# ====================================================================
#   docker compose up --build
#
# This brings up the XDP shield plus two nginx backends on a bridge with a
# predictable name (equinox0) so the shield can attach to it.
#
# L2 NOTE: XDP_TX rewrites the destination MAC and re-transmits the frame out
# the SAME interface, so backends must be on the same L2 segment as the
# interface the shield is attached to. That is why the shield attaches to the
# bridge (equinox0) that the backends live on. To shield real external traffic,
# attach to your host's uplink NIC instead and keep the backends on that L2.

services:
  shield:
    build:
      context: .
      dockerfile: Dockerfile
    # XDP attaches to a host netdev, so we share the host network namespace.
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - BPF
    environment:
      # The bridge created below has a fixed name we can attach to.
      IFACE: equinox0
      CONFIG: /app/config.yaml
      RUST_LOG: info
    volumes:
      # Docker discovery talks to the daemon socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mount the current directory as the config dir. Edit ./config.yaml on the
      # host and the shield reloads it live. If ./config.yaml doesn't exist yet,
      # the entrypoint seeds a default template into it on first run.
      - ./:/app
    depends_on:
      - backend1
      - backend2

  backend1:
    image: nginx:alpine
    networks:
      - backends

  backend2:
    image: nginx:alpine
    networks:
      - backends

networks:
  backends:
    # Fixed docker network name so the shield config can reference it, and a
    # fixed bridge interface name so IFACE=equinox0 is stable.
    name: equinox_backends
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: equinox0
